<!doctype html>
<html lang="en">
  <head>
    <!--
      GitHub Pages note: drop this folder into any static repo and enable GitHub Pages.
      It runs unchanged with no backend or build step; assets are relative static files.
    -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nachweis</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="scenario.js" defer></script>
    <script src="app.js" defer></script>
  </head>

  <body>
    <div class="app">
      <header class="topbar" aria-label="Fortschritt">
        <div class="brand">
          <div class="brand__word" data-wordmark>Nachweis</div>
          <div class="brand__tag">Nachtragsmanagement</div>
        </div>
        <div class="rail" id="rail"></div>
        <div class="status-wrap">
          <div class="language-toggle" aria-label="Language switcher">
            <button class="lang-btn" type="button" data-lang="en">EN</button>
            <button class="lang-btn" type="button" data-lang="de">DE</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </header>

      <main class="stage" id="stage" aria-live="polite"></main>

      <footer class="footer-nav">
        <div class="nav-hint">Keyboard: ← back · →/Enter next · R restart</div>
        <div class="nav-controls">
          <button class="btn dark" type="button" data-prev>← Back</button>
          <button class="btn" type="button" data-next>Next →</button>
          <button class="btn dark" type="button" data-restart>Restart</button>
        </div>
        <div class="progress-readout" id="readout"></div>
      </footer>
    </div>
    <div class="toast" id="toast">Change-order file exported as PDF</div>
  </body>
</html>
