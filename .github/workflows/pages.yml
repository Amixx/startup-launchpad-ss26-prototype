name: Deploy prototype to GitHub Pages

on:
  push:
    branches:
      - main
      - "preview/**"
  delete:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'delete' || github.event.ref_type == 'branch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site
        run: |
          set -euo pipefail

          git fetch origin '+refs/heads/*:refs/remotes/origin/*'

          stage_ref() {
            local ref="$1"
            local target="$2"

            mkdir -p "$target"
            for file in index.html styles.css scenario.js app.js excavation-evidence.png; do
              if git cat-file -e "$ref:$file" 2>/dev/null; then
                git show "$ref:$file" > "$target/$file"
              fi
            done
          }

          slugify() {
            local branch="$1"
            branch="${branch#preview/}"
            printf '%s' "$branch" \
              | tr '/[:upper:]' '-[:lower:]' \
              | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//'
          }

          rm -rf _site
          stage_ref origin/main _site

          mkdir -p _site/previews
          {
            printf '<!doctype html><html lang="en"><head><meta charset="utf-8" />'
            printf '<meta name="viewport" content="width=device-width, initial-scale=1" />'
            printf '<title>Prototype previews</title>'
            printf '<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:40px;line-height:1.45}a{color:#1f6feb}li{margin:8px 0}</style>'
            printf '</head><body><h1>Prototype previews</h1><p><a href="../">main</a></p><ul>'
          } > _site/previews/index.html

          preview_branches="$(
            git for-each-ref --format='%(refname:short)' refs/remotes/origin \
              | sed 's#^origin/##' \
              | grep -E '^preview/' \
              || true
          )"

          printf '%s\n' "$preview_branches" | sort | while read -r branch; do
            if [ -z "$branch" ]; then
              continue
            fi

            slug="$(slugify "$branch")"
            if [ -n "$slug" ]; then
              stage_ref "origin/$branch" "_site/previews/$slug"
              printf '<li><a href="./%s/">%s</a></li>' "$slug" "$branch" >> _site/previews/index.html
            fi
          done

          printf '</ul></body></html>' >> _site/previews/index.html

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summarize preview URL
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          slugify() {
            local branch="$1"
            branch="${branch#preview/}"
            printf '%s' "$branch" \
              | tr '/[:upper:]' '-[:lower:]' \
              | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//'
          }

          {
            echo "## GitHub Pages"
            echo
            echo "Main: ${{ steps.deployment.outputs.page_url }}"
            if [[ "$GITHUB_REF_NAME" == preview/* ]]; then
              slug="$(slugify "$GITHUB_REF_NAME")"
              echo
              echo "Preview: ${{ steps.deployment.outputs.page_url }}previews/$slug/"
            fi
            echo
            echo "Preview index: ${{ steps.deployment.outputs.page_url }}previews/"
          } >> "$GITHUB_STEP_SUMMARY"
